version: '3.8'

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale-node
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=dashboard-host
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-socket:/var/run/tailscale
      - tailscale-tmp:/tmp
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - net_raw
    network_mode: host

  tailscale-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tailscale-dashboard
    restart: unless-stopped
    ports:
      - "1212:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_PATH=/app/data/tailscale-dashboard.db
      - NODE_SYNC_INTERVAL_SEC=${NODE_SYNC_INTERVAL_SEC:-10}
      - PING_POLLING_INTERVAL_SEC=${PING_POLLING_INTERVAL_SEC:-30}
      - PING_TIMEOUT_MS=${PING_TIMEOUT_MS:-5000}
      - DATA_RETENTION_DAYS=${DATA_RETENTION_DAYS:-30}
      - TS_STATE_DIR=/var/lib/tailscale
      - TAILSCALE_API_KEY=${TAILSCALE_API_KEY}
      - TAILSCALE_TAILNET=${TAILSCALE_TAILNET}
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - tailscale-state:/var/lib/tailscale
      - tailscale-socket:/var/run/tailscale
      - tailscale-tmp:/tmp
    depends_on:
      - tailscale

volumes:
  tailscale-state:
  tailscale-socket:
  tailscale-tmp:

networks:
  tailscale-net:
    driver: bridge
